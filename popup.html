<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css"> </head>
<body style="background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; min-width: 300px;">

  <div id="login-view" class="view hidden">
    <div style="display: flex; flex-direction: column; align-items: center; padding: 20px;">
      <svg viewBox="0 0 24 24" width="48" height="48"><circle cx="12" cy="12" r="12" fill="#1DB954"/><path d="M17.2 16.5c-.2 0-.3-.1-.5-.2-2.2-1.3-4.8-2-7.6-2-.8 0-1.6.1-2.4.2-.3.1-.6-.1-.6-.4-.1-.3.1-.6.4-.6.9-.2 1.7-.3 2.6-.3 3 0 5.9.7 8.3 2.2.3.2.3.5.2.8-.1.2-.3.3-.4.3zm1.1-3c-.2 0-.3-.1-.5-.2-2.6-1.6-5.8-2.4-9.1-2.4-1 0-2 .1-2.9.3-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7 1-.2 2.1-.3 3.2-.3 3.6 0 7 .9 9.8 2.6.3.2.4.5.2.8-.1.2-.3.3-.4.3zm1.3-3.4c-.2 0-.3-.1-.4-.1C16 8 12.4 7.2 8.8 7.2c-1.2 0-2.4.1-3.5.4-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7C6.2 6.1 7.5 6 8.8 6c3.8 0 7.7.8 10.8 2.4.3.1.4.5.2.8-.1.2-.3.3-.4.3z" fill="white"/></svg>
      <p style="margin: 15px 0; text-align: center;">Spotify에 연결하세요</p>
      <button id="login-btn" style="background-color: #1DB954; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold;">Spotify 연결</button>
    </div>
  </div>

  <div id="player-view" class="view hidden">
    <div style="display: flex; align-items: baseline; justify-content: center; gap: 8px; margin-bottom: 15px; padding: 0 10px;">
      <span id="track-name" style="font-weight: bold; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;">—</span>
      <span style="color: #b3b3b3; font-size: 13px;">•</span>
      <span id="artist-name" style="color: #b3b3b3; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px;">—</span>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px;">
      <button id="prev-btn" style="background: none; border: none; color: white; cursor: pointer;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="play-pause-btn" style="background: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: black;">
        <svg id="play-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="next-btn" style="background: none; border: none; color: white; cursor: pointer;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button id="favorite-btn" style="background: none; border: none; color: white; cursor: pointer;">
        <svg id="heart-empty" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <svg id="heart-filled" viewBox="0 0 24 24" width="20" height="20" fill="#1DB954" class="hidden"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>

    <div style="display: flex; align-items: center; gap: 10px; padding: 0 10px;">
      <span id="current-time" style="font-size: 11px; color: #b3b3b3; min-width: 30px;">0:00</span>
      <div id="progress-bar" style="flex-grow: 1; height: 4px; background: #4f4f4f; border-radius: 2px; position: relative; cursor: pointer;">
        <div id="progress-filled" style="width: 0%; height: 100%; background: #1DB954; border-radius: 2px;"></div>
        <div id="progress-handle" style="width: 10px; height: 10px; background: white; border-radius: 50%; position: absolute; top: -3px; left: 0%; transform: translateX(-50%); display: none;"></div>
      </div>
      <span id="total-time" style="font-size: 11px; color: #b3b3b3; min-width: 30px;">0:00</span>
    </div>

    <div style="margin-top: 15px; text-align: center;">
      <button id="logout-btn" style="background: none; border: none; color: #b3b3b3; font-size: 11px; cursor: pointer; text-decoration: underline;">로그아웃</button>
    </div>
  </div>

  <div id="no-playback-view" class="view hidden" style="text-align: center; padding: 20px;">
    <p style="font-size: 13px; color: #b3b3b3;">재생 중인 곡 없음</p>
    <button id="logout-btn-nop" style="background: none; border: none; color: #b3b3b3; font-size: 11px; cursor: pointer; text-decoration: underline;">로그아웃</button>
  </div>

  <div id="loading-view" class="view" style="text-align: center; padding: 40px;">
    <div style="border: 3px solid #333; border-top: 3px solid #1DB954; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
  </div>

  <style>
    .view.hidden { display: none !important; }
    .hidden { display: none !important; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #progress-bar:hover #progress-handle { display: block; }
  </style>
  <script src="popup.js"></script>
</body>
</html>
