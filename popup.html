<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="login-view" class="view hidden">
    <div class="login-container">
      <svg viewBox="0 0 24 24" width="48" height="48"><circle cx="12" cy="12" r="12" fill="#1DB954"/><path d="M17.2 16.5c-.2 0-.3-.1-.5-.2-2.2-1.3-4.8-2-7.6-2-.8 0-1.6.1-2.4.2-.3.1-.6-.1-.6-.4-.1-.3.1-.6.4-.6.9-.2 1.7-.3 2.6-.3 3 0 5.9.7 8.3 2.2.3.2.3.5.2.8-.1.2-.3.3-.4.3zm1.1-3c-.2 0-.3-.1-.5-.2-2.6-1.6-5.8-2.4-9.1-2.4-1 0-2 .1-2.9.3-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7 1-.2 2.1-.3 3.2-.3 3.6 0 7 .9 9.8 2.6.3.2.4.5.2.8-.1.2-.3.3-.4.3zm1.3-3.4c-.2 0-.3-.1-.4-.1C16 8 12.4 7.2 8.8 7.2c-1.2 0-2.4.1-3.5.4-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7C6.2 6.1 7.5 6 8.8 6c3.8 0 7.7.8 10.8 2.4.3.1.4.5.2.8-.1.2-.3.3-.4.3z" fill="white"/></svg>
      <p class="login-text">Spotify에 연결하세요</p>
      <button id="login-btn" class="login-btn">Spotify 연결</button>
    </div>
  </div>

  <div id="player-view" class="view hidden">
    <div class="player-grid">
      <!-- 로그아웃 -->
      <button id="logout-btn" class="btn-icon btn-logout grid-logout" title="로그아웃">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>

      <!-- Row 1: 제목 -->
      <div class="player-row">
        <span id="track-name" class="track-name">—</span>
      </div>

      <!-- Row 2: 아티스트 -->
      <div class="player-row">
        <span id="artist-name" class="artist-name">—</span>
      </div>

      <!-- Row 3: 시간 -->
      <div class="player-row">
        <span id="current-time" class="time">0:00</span>
        <span class="time-sep">/</span>
        <span id="total-time" class="time">0:00</span>
      </div>

      <!-- 우측: 3줄 높이 컨트롤러 -->
      <div class="grid-controls">
        <button id="prev-btn" class="btn-icon" title="이전곡">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play-pause-btn" class="btn-icon btn-play" title="재생/일시정지">
          <svg id="play-icon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="next-btn" class="btn-icon" title="다음곡">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>

      <!-- 좋아요 -->
      <button id="favorite-btn" class="favorite-btn" title="좋아요">
        <svg id="heart-empty" viewBox="0 0 24 24" width="38" height="38"><circle cx="12" cy="12" r="10" fill="none" stroke="#b3b3b3" stroke-width="1.5"/><line x1="12" y1="7.5" x2="12" y2="16.5" stroke="#b3b3b3" stroke-width="1.5" stroke-linecap="round"/><line x1="7.5" y1="12" x2="16.5" y2="12" stroke="#b3b3b3" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg id="heart-filled" viewBox="0 0 24 24" width="38" height="38" class="hidden"><circle cx="12" cy="12" r="10" fill="#1DB954"/><path d="M8.5 12.5l2.5 2.5 5-5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <!-- 오른쪽: 리스트 버튼 그룹 (이전/다음/플레이리스트) -->
      <div class="grid-list-btns">
        <button id="recent-btn" class="btn-icon btn-list" title="이전 리스트">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button id="queue-btn" class="btn-icon btn-list" title="다음 리스트">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
        </button>
      </div>
    </div>

    <!-- 리스트 컨테이너 -->
    <div id="list-container" class="list-container hidden"></div>
  </div>

  <div id="no-playback-view" class="view hidden">
    <div class="nop-grid">
      <button id="logout-btn-nop" class="btn-icon btn-logout grid-logout" title="로그아웃">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
      <div class="nop-content">
        <span class="no-playback-text">재생 중인 곡 없음</span>
        <div class="nop-right">
          <span id="next-poll-countdown" class="countdown-text"></span>
          <button id="refresh-btn" class="btn-icon btn-refresh" title="새로고침">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-view" class="view">
    <div class="loading-spinner"></div>
  </div>

  <!-- hidden: progress elements for JS compatibility -->
  <div class="hidden">
    <div id="progress-bar"><div id="progress-filled"></div><div id="progress-handle"></div></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
